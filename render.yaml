services:
  # Backend API Server
  - type: web
    name: buildscore-ai-api
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GROQ_API_KEY
        sync: false

  # Frontend Web Application
  - type: web
    name: buildscore-ai-web
    env: node
    region: oregon
    plan: starter
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: ''
      - key: BACKEND_URL
        fromService:
          type: web
          name: buildscore-ai-api
          property: url
      - key: NODE_ENV
        value: production
