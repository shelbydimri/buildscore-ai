services:
  - type: web
    name: buildscore-ai-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm run dev
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: buildscore-ai-frontend
    env: node
    region: oregon
    plan: starter
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://buildscore-ai-backend.onrender.com
      - key: BACKEND_URL
        value: https://buildscore-ai-backend.onrender.com
      - key: NODE_ENV
        value: production
